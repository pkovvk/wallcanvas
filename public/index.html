<!DOCTYPE html>
<html>

<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0d0d;
            --panel: #171717;
            --panel-hover: #222;
            --border: rgba(255, 255, 255, .08);
            --text: #f5f5f5;
            --muted: #999;
            --accent: #2383e2;
        }


        body {
            margin: 0;
            overflow: hidden;

            background:
                radial-gradient(circle at top,
                    #1d1d1d,
                    #090909 60%);

            font-family:
                Inter,
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;

            color: var(--text);
        }



        /* ---------- FLOATING TOOLBAR ---------- */

        #panel {

            position: fixed;

            top: 24px;
            left: 50%;

            transform: translateX(-50%);


            display: flex;
            gap: 8px;


            padding: 10px;

            background:
                rgba(25, 25, 25, .75);


            backdrop-filter:
                blur(20px);


            border:
                1px solid var(--border);


            border-radius: 18px;


            box-shadow:
                0 20px 50px rgba(0, 0, 0, .45);


            z-index: 1000;

        }



        .btn {

            height: 40px;

            padding: 0 14px;


            display: flex;
            align-items: center;
            gap: 8px;


            border-radius: 10px;


            background:
                transparent;


            color: #ddd;


            border:
                1px solid transparent;


            cursor: pointer;


            font-size: 14px;


            transition: .18s;

        }


        .btn:hover {

            background:
                var(--panel-hover);

            color: white;

        }



        .btn:active {

            transform: scale(.96);

        }



        .btn.save {

            background:
                var(--accent);

            color: white;

        }


        .btn.save:hover {

            background: #3294f4;

        }





        /* ICONS */

        .btn svg {

            width: 17px;
            height: 17px;

        }



        /* ---------- DRAW PANEL ---------- */


        #brushPanel {


            position: fixed;


            top: 92px;

            left: 50%;

            transform:
                translateX(-50%);


            display: none;


            gap: 18px;


            padding: 12px 16px;


            background:
                rgba(25, 25, 25, .85);


            backdrop-filter:
                blur(20px);


            border:
                1px solid var(--border);


            border-radius: 16px;


            box-shadow:
                0 20px 50px rgba(0, 0, 0, .4);


        }



        .sizes button {


            width: 34px;
            height: 34px;


            background: #242424;

            color: white;


            border: none;


            border-radius: 9px;


            cursor: pointer;


        }


        .sizes button:hover {

            background: #333;

        }



        .colors {

            display: flex;
            gap: 10px;

        }


        .color {

            width: 28px;
            height: 28px;

            border-radius: 50%;

            border:
                2px solid rgba(255, 255, 255, .15);


            cursor: pointer;

        }



        /* ---------- LOGIN ---------- */


        #overlay {


            position: fixed;

            inset: 0;


            display: none;


            align-items: center;

            justify-content: center;


            background:
                rgba(0, 0, 0, .55);


            backdrop-filter:
                blur(15px);


            z-index: 5000;

        }



        .login {


            width: 380px;


            padding: 34px;


            border-radius: 24px;


            background:
                #181818;


            border:
                1px solid var(--border);


            box-shadow:
                0 40px 100px rgba(0, 0, 0, .7);


            display: flex;

            flex-direction: column;

            gap: 18px;

        }



        #overlayTitle {


            margin: 0;


            font-size: 28px;


            letter-spacing: -.8px;


        }



        .login input {


            height: 46px;


            padding: 0 14px;


            border-radius: 12px;


            background: #111;


            border:
                1px solid #333;


            color: white;


            outline: none;


        }


        .login input:focus {


            border-color:
                var(--accent);


            box-shadow:
                0 0 0 3px rgba(35, 131, 226, .2);

        }



        .login p {


            margin: 0;


            color: #888;


            line-height: 1.5;


            font-size: 13px;

        }




        /* ---------- TOAST ---------- */


        #toast {


            position: fixed;


            bottom: 32px;

            left: 50%;


            transform:
                translateX(-50%) translateY(80px);


            padding: 12px 20px;


            background: #1c1c1c;


            border:
                1px solid var(--border);


            border-radius: 14px;


            color: white;


            opacity: 0;


            transition: .25s;


            box-shadow:
                0 20px 50px rgba(0, 0, 0, .5);


        }


        #toast.show {


            opacity: 1;


            transform:
                translateX(-50%) translateY(0);

        }



        /* CANVAS */

        canvas {

            display: block;

        }
    </style>
</head>

<body>

    <div id="overlay">


        <div class="login">


            <h2 id="overlayTitle">
                Вход
            </h2>


            <input id="nameInput" placeholder="Ваше имя">


            <button class="btn save" onclick="enterEditor()">

                Начать редактирование

            </button>

            <p>После нажатия Вы начинаете сессию, обязательно сохраните изменения. Пока Ваша сессия активна, другой
                человек не сможет редактировать обои.</p>


        </div>


    </div>


    <div id="toast"></div>


    <div id="panel">

        <label class="btn" for="file">
            Добавить фото
        </label>

        <input type="file" id="file">

        <button class="btn" onclick="remove()">
            Удалить фото
        </button>

        <button class="btn" onclick="toggleDrawing()">
            Рисовать
        </button>

        <button class="btn save" onclick="save()">
            Сохранить изменения
        </button>

    </div>


    <div id="brushPanel">

        <div class="sizes">
            <button onclick="setBrushSize(3)">3</button>
            <button onclick="setBrushSize(7)">7</button>
            <button onclick="setBrushSize(12)">12</button>
            <button onclick="setBrushSize(20)">20</button>
        </div>


        <div class="colors">
            <button class="color black" onclick="setBrushColor('#fff')"></button>
            <button class="color red" onclick="setBrushColor('#ff3b30')"></button>
            <button class="color blue" onclick="setBrushColor('#007aff')"></button>
            <button class="color green" onclick="setBrushColor('#34c759')"></button>
            <button class="color yellow" onclick="setBrushColor('#ffcc00')"></button>
        </div>

    </div>

    <canvas id="c" width="1920" height="1080"></canvas>


    <script src="app.js"></script>


</body>

</html>
