<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>


    <style>
        * {
            box-sizing: border-box;
        }


        html,
        body {

            width: 100%;
            height: 100%;

            margin: 0;

            overflow: hidden;

            font-family:
                Inter,
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;

            background:
                radial-gradient(circle at top,
                    #252525,
                    #090909 65%);

            color: white;
        }



        /* =====================
   CANVAS
===================== */


        canvas {

            position: absolute;

            left: 50%;
            top: 50%;

            transform:
                translate(-50%, -50%);


            border:
                2px dashed rgba(255, 255, 255, .35);


            box-shadow:
                0 30px 80px rgba(0, 0, 0, .5);

        }



        /* =====================
   TOOLBAR
===================== */


        #panel {

            position: fixed;

            top: 24px;

            left: 50%;

            transform: translateX(-50%);


            display: flex;

            gap: 8px;

            align-items: center;


            padding: 10px;


            background:
                rgba(25, 25, 25, .75);


            backdrop-filter:
                blur(20px);


            border:
                1px solid rgba(255, 255, 255, .08);


            border-radius: 18px;


            box-shadow:
                0 20px 50px rgba(0, 0, 0, .5);


            z-index: 1000;

        }



        input[type="file"] {

            display: none;

        }



        .btn {

            height: 42px;

            padding: 0 15px;


            display: flex;

            align-items: center;

            justify-content: center;

            gap: 8px;


            border: none;


            border-radius: 12px;


            background: #202020;


            color: #ddd;


            font-size: 14px;


            cursor: pointer;


            transition: .18s;

        }



        .btn:hover {

            background: #303030;

            color: white;

        }



        .btn:active {

            transform: scale(.96);

        }



        .btn svg {

            width: 17px;

            height: 17px;

        }



        .btn.save {

            background: #2383e2;

            color: white;

        }



        .btn.save:hover {

            background: #3294f4;

        }





        /* =====================
   BRUSH PANEL
===================== */


        #brushPanel {


            position: fixed;


            top: 95px;


            left: 50%;


            transform:
                translateX(-50%);


            display: none;


            gap: 18px;


            align-items: center;


            padding: 12px 16px;


            background:
                rgba(25, 25, 25, .85);


            backdrop-filter:
                blur(20px);


            border:
                1px solid rgba(255, 255, 255, .08);


            border-radius: 16px;


            box-shadow:
                0 20px 50px rgba(0, 0, 0, .5);


            z-index: 999;

        }



        #brushPanel button {

            border: none;

            cursor: pointer;

        }



        .sizes {

            display: flex;

            gap: 6px;

        }



        .sizes button {


            width: 36px;

            height: 36px;


            border-radius: 10px;


            background: #292929;


            color: white;

        }



        .sizes button:hover {

            background: #3a3a3a;

        }



        .colors {

            display: flex;

            gap: 10px;

        }



        .color {


            width: 28px;

            height: 28px;


            border-radius: 50%;


            border:
                2px solid rgba(255, 255, 255, .15);

        }



        /* цвета */

        .black {
            background: #fff;
        }

        .red {
            background: #ff3b30;
        }

        .blue {
            background: #007aff;
        }

        .green {
            background: #34c759;
        }

        .yellow {
            background: #ffcc00;
        }





        /* =====================
   LOGIN
===================== */


        #overlay {


            position: fixed;


            inset: 0;


            display: none;


            align-items: center;

            justify-content: center;


            background:
                rgba(0, 0, 0, .55);


            backdrop-filter:
                blur(18px);


            z-index: 5000;

        }



        .login {


            width: 380px;


            padding: 34px;


            display: flex;


            flex-direction: column;


            gap: 18px;


            background: #181818;


            border:
                1px solid rgba(255, 255, 255, .08);


            border-radius: 24px;


            box-shadow:
                0 40px 100px rgba(0, 0, 0, .7);

        }



        #overlayTitle {


            margin: 0;


            font-size: 28px;


            letter-spacing: -.7px;

        }



        .login input {


            height: 48px;


            padding: 0 15px;


            border-radius: 12px;


            background: #101010;


            border:
                1px solid #333;


            color: white;


            font-size: 15px;


            outline: none;

        }



        .login input:focus {

            border-color: #2383e2;

        }



        .login .btn.save {


            height: 52px;


            width: 100%;


            justify-content: center;


            border-radius: 14px;


            font-size: 15px;


            font-weight: 500;

        }



        .login p {


            margin: 0;


            color: #888;


            font-size: 13px;


            line-height: 1.5;

        }





        /* =====================
   TOAST
===================== */


        #toast {


            position: fixed;


            bottom: 30px;


            left: 50%;


            transform:
                translateX(-50%) translateY(80px);


            padding: 14px 22px;


            background: #202020;


            border-radius: 16px;


            border:
                1px solid rgba(255, 255, 255, .1);


            opacity: 0;


            transition: .25s;


            z-index: 6000;

        }



        #toast.show {


            opacity: 1;


            transform:
                translateX(-50%) translateY(0);

        }
    </style>

</head>


<body>



    <div id="overlay">

        <div class="login">


            <h2 id="overlayTitle">
                Вход
            </h2>


            <input id="nameInput" placeholder="Ваше имя">


            <button class="btn save" onclick="enterEditor()">

                Начать редактирование

            </button>


            <p>
                После нажатия Вы начинаете сессию.
                Обязательно сохраните изменения.
                Пока сессия активна, другой человек
                не сможет редактировать обои.
            </p>


        </div>

    </div>





    <div id="toast"></div>





    <div id="panel">


        <label class="btn" for="file">

            <i data-lucide="image-plus"></i>

            Добавить фото

        </label>


        <input type="file" id="file">



        <button class="btn" onclick="remove()">

            <i data-lucide="trash-2"></i>

        </button>



        <button class="btn" onclick="toggleDrawing()">

            <i data-lucide="paintbrush"></i>

        </button>



        <button class="btn save" onclick="save()">

            <i data-lucide="save"></i>

            Сохранить

        </button>


    </div>






    <div id="brushPanel">


        <div class="sizes">

            <button onclick="setBrushSize(3)">
                3
            </button>

            <button onclick="setBrushSize(7)">
                7
            </button>

            <button onclick="setBrushSize(12)">
                12
            </button>

            <button onclick="setBrushSize(20)">
                20
            </button>

        </div>



        <div class="colors">


            <button class="color black" onclick="setBrushColor('#fff')">
            </button>


            <button class="color red" onclick="setBrushColor('#ff3b30')">
            </button>


            <button class="color blue" onclick="setBrushColor('#007aff')">
            </button>


            <button class="color green" onclick="setBrushColor('#34c759')">
            </button>


            <button class="color yellow" onclick="setBrushColor('#ffcc00')">
            </button>


        </div>


    </div>






    <canvas id="c" width="1920" height="1080">
    </canvas>





    <script src="app.js"></script>


    <script>

        lucide.createIcons();

    </script>



</body>

</html>
